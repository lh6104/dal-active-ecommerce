<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"/>
        <label class="label" data-bind="attr: {'for': getCode()}">
            <img src="/media/payment/sepay/sepay.webp" alt="SePay Logo" style="width: 40px; height: auto;" />
            <span data-bind="text: getTitle()"></span>
        </label>
    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!-- /ko -->

        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!-- /ko -->
        </div>

        <div class="sepay-checkout-note">
            <!-- ko if: isConfigured() -->
            <p>Quét QR hoặc chuyển khoản theo thông tin bên dưới. Sau khi đặt hàng, hệ thống sẽ hiển thị QR theo đúng mã đơn hàng.</p>
            <dl>
                <dt>Ngân hàng</dt>
                <dd data-bind="text: getBankDisplayName()"></dd>
                <dt>Số tài khoản</dt>
                <dd data-bind="text: getAccountNo()"></dd>
                <dt>Chủ tài khoản</dt>
                <dd data-bind="text: getAccountName()"></dd>
            </dl>
            <!-- /ko -->
            <!-- ko ifnot: isConfigured() -->
            <p class="message warning">Phương thức QR chuyển khoản chưa được cấu hình tài khoản nhận tiền.</p>
            <!-- /ko -->
        </div>

        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!-- /ko -->
        </div>

        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="button"
                        data-bind="
                            click: placeOrder,
                            attr: {title: $t('Đặt hàng và nhận QR')},
                            css: {disabled: !isPlaceOrderActionAllowed()},
                            enable: (getCode() == isChecked()) && isPlaceOrderActionAllowed()
                        "
                        disabled>
                    <span data-bind="i18n: 'Đặt hàng và nhận QR'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
